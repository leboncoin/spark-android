name: '📦 Publish to Central Portal'

on:
  push:
    tags: ['*']
  workflow_dispatch:

jobs:
  publish:
    if: github.repository == 'leboncoin/spark-android'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-gradle
      - uses: ./.github/actions/setup-gradle-properties

      - name: '📦 Publish to Central Portal'
        run: ./gradlew publishAggregationToCentralPortal --no-configuration-cache
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSWORD }}

      - name: '📦 Upload Maven artifact'
        uses: actions/upload-artifact@v7
        with:
          name: maven
          path: build/.m2/repository

      - name: '📦 Upload AARs for metrics'
        uses: actions/upload-artifact@v7
        with:
          name: aar-release
          path: '**/build/outputs/aar/*-release.aar'

      - name: '📦 Upload APK for metrics'
        uses: actions/upload-artifact@v7
        with:
          name: apk-release
          path: 'catalog/build/outputs/apk/**/*-release.apk'

  datadog-release:
    name: 📊 Datadog Release Metrics
    needs: publish
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-java

      - name: Download AARs
        uses: actions/download-artifact@v4
        with:
          name: aar-release
          path: aar-output/

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk-release
          path: apk-output/

      - uses: ./.github/actions/diffuse-aar

      - name: Run diffuse on artifacts
        run: |
          diffuse=~/.spark/diffuse/diffuse-0.3.0/bin/diffuse
          aar_dir=$(find aar-output -type d -name aar | head -1)
          "$diffuse" info --apk $(find apk-output -name "*-release.apk" | head -1) > apk.txt
          "$diffuse" info --aar "$aar_dir/spark-release.aar" > spark.txt
          "$diffuse" info --aar "$aar_dir/spark-icons-release.aar" > spark-icons.txt

      - name: Submit artifact metrics
        run: >
          ./scripts/datadog/artifact-metrics.main.kts --
          --input apk.txt
          --input spark.txt
          --input spark-icons.txt
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}

      - name: Submit release cadence metric
        run: |
          previous=$(gh api repos/${{ github.repository }}/releases --jq '.[0].published_at')
          kotlin scripts/datadog/release-metrics.main.kts -- --previous-release "$previous"
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
