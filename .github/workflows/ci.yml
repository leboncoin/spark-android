name: 🏭 CI

on:
  push:
    branches: [ "main", "hotfix/*", "chore-updated-icons" ]
  pull_request:
    branches: [ "main", "hotfix/*", "chore-updated-icons" ]
  merge_group:
    types: [ checks_requested ]
    branches: [ "main", "hotfix/*", "chore-updated-icons" ]

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

permissions:
  security-events: write
  pull-requests: write

jobs:

  validation:
    name: 🛃 Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/check-git-lfs
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-gradle

  checks:
    name: 👮 Checks
    needs: validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-gradle
      - uses: ./.github/actions/setup-gradle-properties
      - run: ./gradlew dependencyGuard --quiet
      - run: ./gradlew spotlessCheck :build-logic:spotlessCheck
      - run: ./gradlew checkLegacyAbi

  build:
    name: 👷 Build
    needs: validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-gradle
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - uses: ./.github/actions/setup-gradle-properties
      - name: 👷 Build
        id: build
        run: ./gradlew assembleRelease
      - name: 📦 Archive APKs
        uses: actions/upload-artifact@v7
        with:
          name: apk
          path: '**/build/outputs/apk/**/*.apk'
      - name: 📦 Archive AARs
        uses: actions/upload-artifact@v7
        with:
          name: aar
          path: '**/build/outputs/aar'
      - name: 📢 Diffuse reports
        if: ${{ always() && github.event_name == 'pull_request' && steps.build.outcome == 'success' }}
        uses: ./.github/actions/diffuse-aar

  test:
    name: 🧑‍🔬 Test
    needs: validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-gradle
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - uses: ./.github/actions/setup-gradle-properties
      - name: 🧑‍🔬 Test
        id: test
        run: ./gradlew globalCiUnitTest verifyPaparazziRelease
      - name: 📦 Archive JUnit reports
        if: ${{ always() && contains(fromJSON('["success", "failure"]'), steps.test.outcome) }}
        uses: ./.github/actions/archive-junit-reports
        with:
          html: '**/build/reports/tests/test*'
          xml: '**/build/test-results/test*/**.xml'
      - name: 📦 Archive Paparazzi reports
        if: ${{ always() && contains(fromJSON('["success", "failure"]'), steps.test.outcome) }}
        uses: ./.github/actions/archive-paparazzi-reports
      - name: 📢 Paparazzi report
        if: ${{ failure() && steps.test.outcome == 'failure' && github.event_name == 'pull_request'}}
        uses: ./.github/actions/paparazzi-report
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}

  lint:
    name: 🕵️ Lint
    needs: validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-gradle
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - uses: ./.github/actions/setup-gradle-properties
      - name: 🕵️ Lint
        id: lint
        run: ./gradlew :spark:lintRelease :spark-screenshot-testing:lintRelease :catalog:lintRelease :spark-lint:lint --continue
      - name: 📦 Archive Lint reports
        if: ${{ always() && contains(fromJSON('["success", "failure"]'), steps.lint.outcome) }}
        uses: ./.github/actions/archive-lint-reports
        with:
          html: '**/build/reports/lint-results*.html'
          sarif: '**/build/reports/lint-results*.sarif'
          xml: '**/build/reports/lint-results*.xml'

      - name: Analyze SARIF report for spark module
        if: ${{ always() && hashFiles('spark/**/*.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ./spark/
          category: spark

      - name: Analyze SARIF report for spark-screenshot-testing module
        if: ${{ always() && hashFiles('spark-screenshot-testing/**/*.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ./spark-screenshot-testing/
          category: spark-screenshot-testing

      - name: Analyze SARIF report for catalog module
        if: ${{ always() && hashFiles('catalog/**/*.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ./catalog/
          category: catalog

  dokka:
    name: 📋 Dokka
    needs: validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-gradle
      - uses: ./.github/actions/setup-gradle-properties
      - uses: actions/setup-python@v6
        with:
          python-version: '3.9'
          cache: pip
          cache-dependency-path: .github/requirements.txt
      - run: pip install -r .github/requirements.txt

      - name: 📋 Build Dokka
        run: ./gradlew dokkaGeneratePublicationHtml publishToMavenLocal
      - name: 📦 Archive Dokka
        uses: actions/upload-artifact@v7
        with:
          name: dokka
          path: build/dokka
      - run: >-
          linkchecker build/dokka
          --ignore-url='/--root--[.]html$'
          --file-output=html --no-status
        id: linkchecker
      - name: 📦 Archive linkchecker
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          archive: false 
          path: linkchecker-out.html

  lava-scan:
    name: 🌋 Lava Scan
    needs: validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: 🌋 Run Lava Vulnerability Scanner
        uses: adevinta/lava-action@ddeeddd8ccf45b403741359471a5627644a0c5f6 # v0.3.4
        with:
          version: latest
          config: lava.yaml
      - uses: actions/upload-artifact@v7
        with:
          name: lava-metrics.json
          path: metrics.json
          archive: false

  finish:
    name: 🏁 Finish
    if: ${{ !cancelled() }} # Skipped jobs are considered successful
    needs:
      - validation
      - checks
      - build
      - test
      - lint
      - dokka
      - lava-scan
    runs-on: ubuntu-latest
    steps:
      - if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        name: Fail
        run: exit 1

  datadog-ci:
    name: 📊 Datadog CI Metrics
    needs: [finish]
    if: ${{ !cancelled() && needs.finish.result == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-java

      - name: Fetch job durations via GitHub API
        run: |
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs \
            --jq '[.jobs[] | select(.completed_at != null and .started_at != null) | {name: .name, duration: (.completed_at | fromdateiso8601) - (.started_at | fromdateiso8601)}]' \
            > job-durations.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Count screenshot tests
        id: screenshots
        run: |
          count=$(grep -r --include="*.kt" -c "@Test" spark-screenshot-testing/src/test | awk -F: '{s+=$2} END {print s}')
          echo "count=$count" >> $GITHUB_OUTPUT

      - name: Submit library metrics
        run: kotlin scripts/datadog/library-metrics.main.kts -- --project-dir .
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}

      - name: Submit CI metrics
        run: >
          kotlin scripts/datadog/ci-metrics.main.kts --
          --jobs-json job-durations.json
          --screenshot-count ${{ steps.screenshots.outputs.count }}
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
