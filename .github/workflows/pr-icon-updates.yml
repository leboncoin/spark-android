name: '🎨 PR icon updates'

on:
  push:
    branches: [ "chore-updated-icons" ]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

jobs:
  pr-icon-updates:
    # Detect recursive calls based on last commit message
    if: ${{ github.event.head_commit.message != '🎨 Update LeboncoinIcons and icon drawables' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: chore-updated-icons
          fetch-depth: 0
          token: ${{ secrets.PAT_SPARK || secrets.GITHUB_TOKEN }}
      - run: gh pr create --fill
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}

      # The upstream spark-tokens workflow pushes raw drawables into spark-icons/icons/.
      # Copy them into both the Android res directory and the KMP compose resources directory,
      # then remove the staging area.
      - run: |
          mkdir -p spark-icons/src/androidMain/res/drawable
          mkdir -p spark-icons/src/nonAndroidMain/composeResources/drawable
          cp -r spark-icons/icons/. spark-icons/src/androidMain/res/drawable/
          cp -r spark-icons/icons/. spark-icons/src/nonAndroidMain/composeResources/drawable/
          rm -rf spark-icons/icons
      - run: |
          ./scripts/spark-icons-kt/spark-icons-kt.main.kts \
            --in=spark-icons/src/androidMain/res/drawable \
            --output-dir=spark-icons/src \
            --copyright=scripts/spark-icons-kt/COPYRIGHT.kt
          git add spark-icons/src spark-icons
          if ! git diff --cached --quiet --exit-code ;
          then
            git config user.name 'spark-ui-bot'
            git config user.email 'spark-ui-bot@users.noreply.github.com'
            git commit -m '🎨 Update LeboncoinIcons and icon drawables'
            git push
            echo "::notice::UPDATED"
          else
            echo "::notice::UP-TO-DATE"
          fi
