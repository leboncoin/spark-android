name: '🔧 Icon hotfix: open backmerge PR'

on:
  push:
    tags: ['*']

permissions:
  contents: read
  pull-requests: write

jobs:
  open-backmerge-pr:
    if: github.repository == 'leboncoin/spark-android'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect hotfix branch for this tag
        id: detect
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          branch=$(git branch -r --contains "refs/tags/$TAG_NAME" \
            | grep 'origin/hotfix/' \
            | sed 's|.*origin/||' \
            | tr -d '[:space:]' \
            | head -1 || true)
          if [ -z "$branch" ]; then
            echo "Not a hotfix tag — skipping."
          fi
          echo "hotfix_branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Open backmerge PR
        if: steps.detect.outputs.hotfix_branch != ''
        env:
          GH_TOKEN: ${{ secrets.PAT_SPARK }}
          HOTFIX_BRANCH: ${{ steps.detect.outputs.hotfix_branch }}
        run: |
          body="Automated backmerge of \`${HOTFIX_BRANCH}\` into \`main\` after the hotfix release.

          > ⚠️ **Must be merged as a merge commit — not squash.**
          > Squash merges break release-please's changelog ancestry.
          > See [RELEASING.md](../RELEASING.md) for details."

          gh pr create \
            --base main \
            --head "$HOTFIX_BRANCH" \
            --title "chore: merge $HOTFIX_BRANCH into main" \
            --body "$body" \
          || gh pr view \
            --repo "$GITHUB_REPOSITORY" \
            --json url --jq .url \
            "$HOTFIX_BRANCH"
